    /* ============================================================
       Design tokens
       ============================================================ */

    /* ---- design tokens ---- */
    :root {
      --bone:    #F7F6F3;
      --surface: #FFFFFF;
      --line:    #EAEAEA;
      --ink:     #1A1A18;
      --muted:   #787774;
      --faint:   #9B9A96;
      --track:   #EEEDEA;
      --sans: "Geist", "Helvetica Neue", -apple-system, system-ui, "Segoe UI", sans-serif;
      --mono: "Geist Mono", ui-monospace, "SF Mono", "JetBrains Mono", monospace;
      --label-w: 60px;
      --topbar-h: 58px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-padding-top: var(--topbar-h); }
    html, body {
      background: var(--bone);
      color: var(--ink);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    body { min-height: 100svh; }

    /* ============================================================
       Sticky top bar + animated layout switch
       ============================================================ */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 13px clamp(16px, 4vw, 48px);
      background: rgba(247, 246, 243, 0.82);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
    }
    .topbar .title h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
    .topbar .title .sub {
      margin-top: 2px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--faint);
    }

    .switch {
      position: relative;
      flex: none;
      display: inline-flex;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--track);
    }
    .switch .seg {
      position: relative;
      z-index: 1;
      border: 0;
      background: transparent;
      cursor: pointer;
      padding: 6px 16px;
      font-family: var(--mono);
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.25s ease;
    }
    .switch .thumb {
      position: absolute;
      top: 3px;
      bottom: 3px;
      left: 3px;
      width: calc((100% - 6px) / 2);
      border-radius: 999px;
      background: var(--surface);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }
    [data-view="agenda"] .switch .thumb { transform: translateX(0); }
    [data-view="grid"]   .switch .thumb { transform: translateX(100%); }
    [data-view="agenda"] .seg[data-target="agenda"],
    [data-view="grid"]   .seg[data-target="grid"] { color: var(--ink); }

    /* ============================================================
       View visibility + entrance animation
       ============================================================ */
    .view { display: none; }
    [data-view="grid"]   .view-grid,
    [data-view="agenda"] .view-agenda {
      display: block;
      animation: viewIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes viewIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      .view { animation: none !important; }
      .switch .thumb { transition: none !important; }
    }

    /* ============================================================
       GRID view (desktop week grid)
       ============================================================ */
    .view-grid .gridwrap { max-width: 1820px; margin: 0 auto; padding: 26px clamp(16px, 4vw, 48px) 72px; }
    .view-grid .scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .view-grid .grid { min-width: 920px; }

    .view-grid .hours {
      position: relative;
      display: grid;
      grid-template-columns: var(--label-w) repeat(9, 1fr);
      margin-bottom: 8px;
    }
    .view-grid .hours .hr {
      padding-left: 2px;
      border-left: 1px solid var(--line);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--faint);
    }
    .view-grid .hours .hr.last { border-right: 1px solid var(--line); }
    .view-grid .hours .hrend {
      position: absolute;
      top: 0; right: 0;
      padding-right: 5px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--faint);
    }

    .view-grid .day {
      display: grid;
      grid-template-columns: var(--label-w) 1fr;
      align-items: stretch;
      border-top: 1px solid var(--line);
    }
    .view-grid .day:last-of-type { border-bottom: 1px solid var(--line); }
    .view-grid .day .label {
      display: flex;
      align-items: center;
      padding: 8px 12px 8px 2px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .view-grid .track {
      position: relative;
      display: grid;
      grid-template-columns: repeat(18, 1fr);
      grid-auto-rows: minmax(118px, auto);
      background-image: repeating-linear-gradient(
        to right, var(--line) 0 1px, transparent 1px calc(100% / 9)
      );
      background-position: left;
    }

    .view-grid .ev {
      grid-row: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
      margin: 6px 5px;
      padding: 9px 11px 10px 12px;
      overflow: hidden;
      border: 1px solid rgba(0, 0, 0, 0.05);
      border-left: 3px solid var(--bar);
      border-radius: 8px;
      background: var(--tint);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
    }
    .view-grid .ev .code {
      font-size: 13px; font-weight: 600; letter-spacing: -0.01em; color: var(--ink);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .view-grid .ev .where { min-width: 0; margin: 3px 0 1px; }
    .view-grid .ev .venue {
      display: inline-block; max-width: 100%; padding: 1px 6px; border-radius: 4px;
      background: rgba(0, 0, 0, 0.055);
      font-size: 11px; font-weight: 600; line-height: 1.4; color: var(--ink);
      white-space: normal; overflow-wrap: anywhere;
    }
    .view-grid .ev .who {
      display: flex; align-items: center; gap: 6px; min-width: 0;
      margin-top: auto; font-size: 11px; color: var(--faint);
    }
    .view-grid .ev .who .nm { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .view-grid .ev .badge {
      flex: none; padding: 0 4px; border: 1px solid var(--bar); border-radius: 3px;
      font-family: var(--mono); font-size: 9px; font-weight: 600; line-height: 14px;
      letter-spacing: 0.06em; color: var(--bar); opacity: 0.9;
    }
    .view-grid .ev .time {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.02em;
      color: var(--muted); white-space: nowrap;
    }

    .view-grid .legend {
      display: flex; flex-direction: column; gap: 18px;
      margin-top: 30px; padding-top: 22px; border-top: 1px solid var(--line);
    }
    .view-grid .legend .courses {
      display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 13px 44px;
    }
    .view-grid .legend .item { display: flex; align-items: center; gap: 10px; min-width: 0; font-size: 12.5px; }
    .view-grid .legend .dot { flex: none; width: 11px; height: 11px; border-radius: 3px; }
    .view-grid .legend .item .c { flex: none; font-family: var(--mono); font-size: 11px; letter-spacing: 0.02em; color: var(--ink); }
    .view-grid .legend .item .nm { color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .view-grid .legend .types {
      display: flex; justify-content: center; gap: 18px;
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em; color: var(--faint);
    }

    /* ============================================================
       AGENDA view (mobile day-by-day list)
       ============================================================ */
    .view-agenda .agendawrap { max-width: 460px; margin: 0 auto; padding: 6px 18px 40px; }

    .view-agenda .day-head {
      position: sticky;
      top: var(--topbar-h);
      z-index: 2;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin: 0 -18px;
      padding: 14px 18px 8px;
      background: var(--bone);
      border-bottom: 1px solid var(--line);
    }
    .view-agenda .day-head .name {
      font-size: 13px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink);
    }
    .view-agenda .day-head .count {
      font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.04em; color: var(--faint);
    }
    .view-agenda .day-body { padding-top: 12px; padding-bottom: 6px; }
    .view-agenda .day-body .empty { padding: 4px 2px 8px; font-size: 13px; color: var(--faint); }

    .view-agenda .ev {
      display: block;
      margin-bottom: 10px;
      padding: 12px 14px 13px;
      border: 1px solid rgba(0, 0, 0, 0.05);
      border-left: 3px solid var(--bar);
      border-radius: 10px;
      background: var(--tint);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
    }
    .view-agenda .ev:last-child { margin-bottom: 0; }
    .view-agenda .ev .top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .view-agenda .ev .time {
      font-family: var(--mono); font-size: 12px; font-weight: 600; letter-spacing: 0.02em; color: var(--ink);
    }
    .view-agenda .ev .badge {
      flex: none; padding: 1px 6px; border: 1px solid var(--bar); border-radius: 3px;
      font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: 0.06em; line-height: 15px;
      color: var(--bar); opacity: 0.9;
    }
    .view-agenda .ev .code { margin-top: 8px; font-size: 15px; font-weight: 600; letter-spacing: -0.01em; color: var(--ink); }
    .view-agenda .ev .name { margin-top: 1px; font-size: 12px; line-height: 1.3; color: var(--muted); }
    .view-agenda .ev .meta { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .view-agenda .ev .venue {
      padding: 1px 7px; border-radius: 4px; background: rgba(0, 0, 0, 0.055);
      font-size: 11.5px; font-weight: 600; color: var(--ink);
    }
    .view-agenda .ev .who { font-size: 12px; color: var(--faint); }

    .view-agenda .legend { margin-top: 26px; padding-top: 20px; border-top: 1px solid var(--line); }
    .view-agenda .legend .courses { display: flex; flex-direction: column; gap: 10px; }
    .view-agenda .legend .item { display: flex; align-items: center; gap: 10px; font-size: 12.5px; }
    .view-agenda .legend .dot { flex: none; width: 11px; height: 11px; border-radius: 3px; }
    .view-agenda .legend .item .c { flex: none; font-family: var(--mono); font-size: 11px; letter-spacing: 0.02em; color: var(--ink); }
    .view-agenda .legend .item .nm { color: var(--muted); }
    .view-agenda .legend .types {
      display: flex; justify-content: center; gap: 16px; margin-top: 18px;
      font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.04em; color: var(--faint);
    }

    /* ============================================================
       Print (A4 landscape) — always the grid
       ============================================================ */
    @media print {
      @page { size: A4 landscape; margin: 12mm; }
      .topbar { display: none; }
      body { background: #fff; }
      .view { display: none !important; }
      .view-grid { display: block !important; animation: none; }
      .view-grid .gridwrap { padding: 0; max-width: none; }
      .view-grid .scroll { overflow: visible; }
      .view-grid .grid { min-width: 0; }
      .view-grid .ev { box-shadow: none; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="title">
      <h1>Class Timetable</h1>
      <div class="sub">Year 2 · Semester 1</div>
    </div>
    <div class="switch" role="tablist" aria-label="Choose layout">
      <span class="thumb" aria-hidden="true"></span>
      <button class="seg" type="button" data-target="agenda" role="tab">Agenda</button>
      <button class="seg" type="button" data-target="grid" role="tab">Grid</button>
    </div>
  </header>

  <!-- GRID -->
  <section class="view view-grid">
    <div class="gridwrap">
      <div class="scroll">
        <div class="grid">
          <div class="hours" id="hours"></div>
          <div id="days"></div>
        </div>
      </div>
      <div class="legend" id="legend-grid"></div>
    </div>
  </section>

  <!-- AGENDA -->
  <section class="view view-agenda">
    <div class="agendawrap">
      <main id="schedule"></main>
      <div class="legend" id="legend-agenda"></div>
    </div>
  </section>

  <script>
    "use strict";

    /* ============================================================
       1. Data — edit these two objects to update the timetable
       ============================================================ */
    const COURSES = {
      "BMIT2073": { bar: "#2F6FBF", tint: "#EEF3FA", name: "Mobile Application Development" },
      "BMCS2063": { bar: "#3E8E5A", tint: "#EDF5F0", name: "Data Structures and Algorithms" },
      "BMSE2073": { bar: "#C08A2E", tint: "#FAF4E9", name: "Software Design and Architecture" },
      "MPU-3332": { bar: "#7A5BB0", tint: "#F2EFF8", name: "Entrepreneurship" },
      "BMDS2003": { bar: "#C0556A", tint: "#FAEFF1", name: "Data Science" },
      "BMIT2004": { bar: "#2E9AA0", tint: "#EAF5F5", name: "Fundamentals of Computer Networks" },
    };

    const TYPES = { L: "Lecture", T: "Tutorial", P: "Practical" };
    const DAYS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

    // Sessions per day. Fields:
    //   c  course code (key into COURSES)   ty type (L | T | P)
    //   v  venue                            w  lecturer
    //   s  start time "H:MM"                e  end time "H:MM"
    const EVENTS = {
      Mon: [
        { c: "BMIT2073", ty: "L", v: "DK ABA", w: "See Kwee Teck",    s: "8:00",  e: "10:00" },
        { c: "BMCS2063", ty: "L", v: "DK ABA", w: "Thamarai",         s: "12:00", e: "14:00" },
      ],
      Tue: [
        { c: "BMSE2073", ty: "L", v: "DK7",   w: "Mohd Ridzuan Bin", s: "8:00",  e: "10:00" },
        { c: "MPU-3332", ty: "L", v: "DK ABA", w: "Oh Kim Yong",      s: "13:00", e: "14:00" },
        { c: "BMDS2003", ty: "P", v: "B001E",  w: "Lim Siew Moni",    s: "15:00", e: "17:00" },
      ],
      Wed: [
        { c: "MPU-3332", ty: "T", v: "TA246",  w: "Oh Kim Yong",      s: "8:00",  e: "9:00"  },
        { c: "BMIT2004", ty: "L", v: "DK ABA", w: "Sangeetha",        s: "15:00", e: "17:00" },
      ],
      Thu: [
        { c: "BMIT2004", ty: "P", v: "B100K",  w: "Ting Hie Choon",   s: "8:00",  e: "10:00" },
        { c: "BMIT2073", ty: "P", v: "B100L",  w: "Ong Jia Hui",      s: "11:00", e: "13:00" },
        { c: "BMDS2003", ty: "L", v: "DK ABD", w: "Noor Aida",        s: "14:00", e: "16:00" },
      ],
      Fri: [
        { c: "BMCS2063", ty: "P", v: "D303E",  w: "Yeoh Kar Peng",    s: "8:00",  e: "10:00" },
        { c: "BMIT2004", ty: "T", v: "TA240",  w: "Ting Hie Choon",   s: "10:00", e: "11:00" },
      ],
      Sat: [
        { c: "BMSE2073", ty: "P", v: "P104 Experimental room", w: "Gui Mow Fang", s: "8:00",  e: "9:00"  },
        { c: "BMSE2073", ty: "T", v: "TA245",                  w: "Gui Mow Fang", s: "11:30", e: "12:30" },
      ],
    };

    /* ============================================================
       2. Helpers
       ============================================================ */
    const DAY_START = 8;        // grid begins at 08:00
    const SLOT_MINUTES = 30;    // one grid column = 30 minutes

    function toMinutes(time) {
      const [h, m] = time.split(":").map(Number);
      return h * 60 + m;
    }
    function gridLine(time) {
      return (toMinutes(time) - DAY_START * 60) / SLOT_MINUTES + 1;
    }
    function formatTime(time) {
      const [h, m] = time.split(":").map(Number);
      return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
    }
    function esc(text) {
      return String(text).replace(/[&<>"]/g, (ch) => (
        { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[ch]
      ));
    }

    /* ============================================================
       3. GRID rendering
       ============================================================ */
    function renderRuler() {
      const ticks = Array.from({ length: 9 }, (_, i) => {
        const label = `${String(DAY_START + i).padStart(2, "0")}:00`;
        return `<div class="${i === 8 ? "hr last" : "hr"}">${label}</div>`;
      });
      document.getElementById("hours").innerHTML =
        `<div class="corner"></div>` + ticks.join("") + `<div class="hrend">17:00</div>`;
    }

    function gridCard(ev) {
      const course = COURSES[ev.c];
      const style =
        `grid-column:${gridLine(ev.s)}/${gridLine(ev.e)};--bar:${course.bar};--tint:${course.tint}`;
      return `<div class="ev" style="${style}">
        <div class="code">${esc(ev.c)}</div>
        <div class="where"><span class="venue">${esc(ev.v)}</span></div>
        <div class="who"><span class="badge">${esc(ev.ty)}</span><span class="nm">${esc(ev.w)}</span></div>
        <div class="time">${formatTime(ev.s)} – ${formatTime(ev.e)}</div>
      </div>`;
    }

    function renderDays() {
      document.getElementById("days").innerHTML = DAYS.map((day) => {
        const cards = (EVENTS[day] || []).map(gridCard).join("");
        return `<div class="day"><div class="label">${day}</div><div class="track">${cards}</div></div>`;
      }).join("");
    }

    /* ============================================================
       4. AGENDA rendering
       ============================================================ */
    function agendaCard(ev) {
      const course = COURSES[ev.c];
      return `<article class="ev" style="--bar:${course.bar};--tint:${course.tint}">
        <div class="top">
          <span class="time">${formatTime(ev.s)} – ${formatTime(ev.e)}</span>
          <span class="badge">${esc(ev.ty)}</span>
        </div>
        <div class="code">${esc(ev.c)}</div>
        <div class="name">${esc(course.name)}</div>
        <div class="meta">
          <span class="venue">${esc(ev.v)}</span>
          <span class="who">${esc(ev.w)}</span>
        </div>
      </article>`;
    }

    function renderSchedule() {
      document.getElementById("schedule").innerHTML = DAYS.map((day) => {
        const items = (EVENTS[day] || []).slice().sort((a, b) => toMinutes(a.s) - toMinutes(b.s));
        const count = items.length
          ? `${items.length} ${items.length > 1 ? "classes" : "class"}`
          : "Free";
        const body = items.length
          ? items.map(agendaCard).join("")
          : `<div class="empty">No classes</div>`;
        return `<section class="day">
          <div class="day-head"><span class="name">${day}</span><span class="count">${count}</span></div>
          <div class="day-body">${body}</div>
        </section>`;
      }).join("");
    }

    /* ============================================================
       5. Legend (identical markup for both views)
       ============================================================ */
    function legendHTML() {
      const courses = Object.entries(COURSES).map(([code, c]) =>
        `<div class="item">
          <span class="dot" style="background:${c.bar}"></span>
          <span class="c">${esc(code)}</span>
          <span class="nm">${esc(c.name)}</span>
        </div>`
      ).join("");
      const types = Object.entries(TYPES)
        .map(([key, label]) => `<span>${esc(key)} · ${esc(label)}</span>`)
        .join("");
      return `<div class="courses">${courses}</div><div class="types">${types}</div>`;
    }

    /* ============================================================
       6. View switch + boot
       ============================================================ */
    const VIEW_KEY = "tt-view";
    const root = document.documentElement;

    function setView(view) {
      root.dataset.view = view;
      try { localStorage.setItem(VIEW_KEY, view); } catch (e) {}
    }

    function syncTopbarHeight() {
      const bar = document.querySelector(".topbar");
      if (bar) root.style.setProperty("--topbar-h", bar.offsetHeight + "px");
    }

    // render everything once; both views live in the DOM, CSS shows one
    renderRuler();
    renderDays();
    renderSchedule();
    document.getElementById("legend-grid").innerHTML = legendHTML();
    document.getElementById("legend-agenda").innerHTML = legendHTML();

    document.querySelectorAll(".seg").forEach((btn) => {
      btn.addEventListener("click", () => setView(btn.dataset.target));
    });

    syncTopbarHeight();
    window.addEventListener("resize", syncTopbarHeight);

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
